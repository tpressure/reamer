name: CI

on:
  push:
  pull_request:

jobs:
  build-images:
    name: Build Images
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build server image
        run: nix build .#server.raw --out-link result-server --print-build-logs

      - name: Build client image
        run: nix build .#client.raw --out-link result-client --print-build-logs

      - name: Package image artifacts
        run: |
          mkdir -p artifacts
          tar -cjf artifacts/server-image.tar.bz2 -C result-server nixos.img
          tar -cjf artifacts/client-image.tar.bz2 -C result-client nixos.img

      - name: Upload server image artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-image-${{ github.sha }}
          path: artifacts/server-image.tar.bz2
          compression-level: 0
          if-no-files-found: error

      - name: Upload client image artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-image-${{ github.sha }}
          path: artifacts/client-image.tar.bz2
          compression-level: 0
          if-no-files-found: error
